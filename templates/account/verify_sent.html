{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Check your email — NexusLink</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,600;0,700;0,900;1,300;1,700&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static 'style.css' %}">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: var(--chalk);
    margin: 0;
    padding: 20px;
  }
  .card {
    background: white;
    border-radius: 24px;
    padding: 48px 36px;
    width: 100%;
    max-width: 460px;
    box-shadow: 8px 8px 0 rgba(44,36,22,0.10);
    border: 2px solid var(--border);
    text-align: center;
  }
  .icon { font-size: 56px; margin-bottom: 20px; }
  h1 {
    font-family: var(--font-display);
    font-size: 26px; font-weight: 900;
    margin: 0 0 10px 0;
  }
  p { color: var(--muted); font-size: 14px; line-height: 1.7; margin: 0 0 8px 0; }
  .email-highlight {
    font-weight: 700; color: var(--rust);
  }
  .back-link {
    display: inline-block;
    margin-top: 28px;
    color: var(--muted);
    font-size: 13px;
    font-weight: 600;
    text-decoration: none;
  }
  .back-link:hover { color: var(--ink); }
</style>
</head>
<body>
<div class="grain"></div>
<div class="blob blob--mint" style="position:fixed;top:-100px;right:-100px;z-index:0;"></div>
<div class="card">
  <div class="icon">📬</div>
  <h1>Check your inbox!</h1>
  <p>We've sent a verification link to<br>
    <span class="email-highlight">{{ email }}</span>
  </p>
  <p>Click the link in the email to activate your account.<br>
  It may take a minute or two to arrive.</p>
  <a href="{% url 'index' %}" class="back-link">← Back to home</a>
</div>
</body>
</html>
