{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enter OTP — NexusLink</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,600;0,700;0,900;1,300;1,700&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'style.css' %}">
  <style>
    body { padding-top: 60px; }
    .auth-title { text-align: center; font-family: var(--font-display); font-size: 28px; font-weight: 900; margin-bottom: 8px; }
    .auth-sub { text-align: center; color: var(--muted); font-size: 14px; margin-bottom: 32px; }
    .otp-input {
      width: 100%; text-align: center; letter-spacing: 12px; font-size: 24px; font-weight: 800; font-family: var(--font-body);
      padding: 16px; border-radius: 12px; border: 2px solid var(--border); background: var(--chalk); outline: none; transition: all 0.2s;
    }
    .otp-input:focus { border-color: var(--rust); background: white; }
    .error-msg { background: var(--rust-light); color: var(--rust); padding: 12px; border-radius: 8px; font-size: 13px; font-weight: 700; margin-bottom: 16px; text-align: center; }
  </style>
</head>
<body>
  <div class="grain"></div>
  <main class="auth-layout container">
    <div class="clay-card auth-card" style="margin:0 auto; max-width:440px;">
      <div style="text-align:center; margin-bottom: 24px;">
        <div class="hero-logo-mark" style="width:48px;height:48px;font-size:24px;margin:0 auto;">N</div>
      </div>

      <h1 class="auth-title">Check your email</h1>
      <p class="auth-sub">We've sent a 6-digit code to <strong>{{ email }}</strong>. It expires in 5 minutes.</p>

      {% if error %}
        <div class="error-msg">{{ error }}</div>
      {% endif %}

      <form method="post" action="{% url 'verify_otp' %}" style="display:flex;flex-direction:column;gap:20px;">
        {% csrf_token %}
        <input type="text" name="otp" class="otp-input" placeholder="000000" maxlength="6" autocomplete="one-time-code" required autofocus>
        <button type="submit" class="btn-clay btn-clay--rust" style="width:100%; justify-content:center;">Verify & Join</button>
      </form>
    </div>
  </main>
</body>
</html>
